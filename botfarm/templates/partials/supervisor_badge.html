{% if supervisor is defined and supervisor %}
    {% if supervisor.running %}
        {% if pause_state is defined and pause_state == "start_paused" %}
        <span class="supervisor-badge supervisor-badge-paused">
            <span class="supervisor-dot supervisor-dot-paused"></span>
            Supervisor Paused
        </span>
        {% else %}
        <span class="supervisor-badge supervisor-badge-running">
            <span class="supervisor-dot supervisor-dot-running"></span>
            Supervisor Running
        </span>
        {% endif %}
    {% else %}
    <span class="supervisor-badge supervisor-badge-stopped">
        <span class="supervisor-dot supervisor-dot-stopped"></span>
        Supervisor Stopped
    </span>
    {% endif %}
{% endif %}
