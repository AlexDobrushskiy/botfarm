{% if update_status == "updating" %}
<div style="background: var(--pico-color-yellow-500, #eab308); color: #000; padding: 0.5rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;">
    <span><strong>Updating&hellip;</strong> Pulling latest code and restarting.</span>
</div>
{% elif commits_behind and commits_behind > 0 %}
<div style="background: var(--pico-color-blue-600, #2563eb); color: #fff; padding: 0.5rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;">
    <span>
        <strong>Update available</strong>
        ({{ commits_behind }} commit{{ "s" if commits_behind != 1 else "" }} behind)
    </span>
    <button class="pause-btn"
            style="background: #fff; color: var(--pico-color-blue-600, #2563eb);"
            hx-post="/api/update"
            hx-swap="none"
            hx-confirm="This will pause workers, pull the latest code, and restart the supervisor. Continue?"
            hx-on::after-request="this.closest('[hx-get]') && htmx.trigger(this.closest('[hx-get]'), 'htmx:load')">
        Update &amp; Restart
    </button>
</div>
{% endif %}
