{% extends "base.html" %}
{% set active_page = "add_project" %}
{% block title %}Add Project - Botfarm{% endblock %}
{% block content %}
<h1>Add Project</h1>

<div id="add-project-form-container">
    <form id="add-project-form" onsubmit="return submitAddProject(event)">
        <label for="repo_url">
            Repository URL <small>(leave empty to create a new repo)</small>
            <input type="text" id="repo_url" name="repo_url" placeholder="git@github.com:user/repo.git"
                   oninput="suggestProjectName(); toggleGithubOption()">
        </label>

        <label for="project_name">
            Project name
            <input type="text" id="project_name" name="name" placeholder="my-project" required>
        </label>

        <label id="create_github_label" style="display:none;">
            <input type="checkbox" id="create_github" name="create_github" role="switch">
            Create GitHub repository (private, via <code>gh</code> CLI)
        </label>

        {# --- Linear-specific fields --- #}
        <div id="linear-fields" {% if bugtracker_type != "linear" %}style="display:none;"{% endif %}>
            <label for="team">
                Team
                <select id="team" name="team" onchange="loadProjects()">
                    <option value="">Loading teams...</option>
                </select>
            </label>

            <fieldset>
                <label>
                    <input type="checkbox" id="create_linear_project" name="create_linear_project" checked
                           onchange="toggleLinearProjectMode()">
                    Create new Linear project
                </label>
            </fieldset>

            <div id="linear-project-new">
                <label for="new_linear_project_name">
                    New Linear project name
                    <input type="text" id="new_linear_project_name" name="new_linear_project_name"
                           placeholder="Will use project name if empty">
                </label>
            </div>

            <div id="linear-project-existing" style="display:none;">
                <label for="tracker_project">
                    Existing Linear project <small>(optional — limits which tickets botfarm picks up)</small>
                    <select id="tracker_project" name="tracker_project">
                        <option value="">— None (monitor all tickets in team) —</option>
                    </select>
                </label>
            </div>
        </div>

        {# --- Jira-specific fields --- #}
        <div id="jira-fields" {% if bugtracker_type != "jira" %}style="display:none;"{% endif %}>
            <label for="jira_project_key">
                Jira project key
                <input type="text" id="jira_project_key" name="jira_project_key"
                       placeholder="e.g. AIR, PROJ">
            </label>

            <label for="jira_include_tags">
                Include tags <small>(optional — only pick up tickets with these labels)</small>
                <input type="text" id="jira_include_tags" name="jira_include_tags"
                       placeholder="Comma-separated, e.g. botfarm, ready">
            </label>
        </div>

        <label for="slots_count">
            Number of slots
            <input type="number" id="slots_count" name="slots" value="1" min="1" max="20" required>
        </label>

        <label for="project_type">
            Project type <small>(optional — e.g. python, node, generic)</small>
            <select id="project_type" name="project_type" onchange="updateSetupCommands()">
                <option value="">— None —</option>
                <option value="python">Python</option>
                <option value="node">Node.js</option>
                <option value="generic">Generic</option>
            </select>
        </label>

        <label for="setup_commands">
            Setup commands <small>(optional — run in each worktree after creation)</small>
            <textarea id="setup_commands" name="setup_commands" rows="3"
                      placeholder="One command per line, e.g.&#10;python -m venv .venv&#10;.venv/bin/pip install -r requirements.txt"></textarea>
        </label>

        <div id="form-errors" style="display:none; color: var(--pico-del-color); margin-bottom: 1rem;"></div>

        <button type="submit" id="submit-btn">Add Project</button>
    </form>
</div>

<div id="add-project-progress" style="display:none;">
    <h2>Setting up project...</h2>
    <div id="progress-log" style="background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 1rem; font-family: monospace; font-size: 0.85rem; min-height: 8rem; max-height: 24rem; overflow-y: auto; white-space: pre-wrap;"></div>
    <div id="progress-result" style="margin-top: 1rem;"></div>
</div>

<script>
var _bugtrackerType = {{ bugtracker_type | tojson }};

function toggleLinearProjectMode() {
    var checked = document.getElementById("create_linear_project").checked;
    document.getElementById("linear-project-new").style.display = checked ? "block" : "none";
    document.getElementById("linear-project-existing").style.display = checked ? "none" : "block";
}

var _suggestTimer = null;

function suggestProjectName() {
    clearTimeout(_suggestTimer);
    _suggestTimer = setTimeout(function() {
        var url = document.getElementById("repo_url").value.trim();
        if (!url) return;
        var nameField = document.getElementById("project_name");
        if (nameField.dataset.userEdited) return;
        fetch("/api/project/suggest-name?repo_url=" + encodeURIComponent(url))
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.name && !nameField.dataset.userEdited) {
                    nameField.value = d.name;
                }
            })
            .catch(function() {});
    }, 300);
}

document.getElementById("project_name").addEventListener("input", function() {
    this.dataset.userEdited = "1";
});

function toggleGithubOption() {
    var url = document.getElementById("repo_url").value.trim();
    document.getElementById("create_github_label").style.display = url ? "none" : "";
    if (url) document.getElementById("create_github").checked = false;
}

var _defaultSetupCommands = {
    "python": "python -m venv .venv\n.venv/bin/pip install -r requirements.txt\n.venv/bin/pip install -e .",
    "node": "npm install"
};

function updateSetupCommands() {
    var sel = document.getElementById("project_type");
    var textarea = document.getElementById("setup_commands");
    if (textarea.dataset.userEdited) return;
    textarea.value = _defaultSetupCommands[sel.value] || "";
}

document.getElementById("setup_commands").addEventListener("input", function() {
    this.dataset.userEdited = "1";
});

function loadTeams() {
    var sel = document.getElementById("team");
    fetch("/api/bugtracker/teams")
        .then(function(r) {
            if (!r.ok) throw new Error("Failed to load teams");
            return r.json();
        })
        .then(function(teams) {
            sel.innerHTML = '<option value="">— Select team —</option>';
            teams.forEach(function(t) {
                var opt = document.createElement("option");
                opt.value = t.key;
                opt.textContent = t.name + " (" + t.key + ")";
                sel.appendChild(opt);
            });
        })
        .catch(function(err) {
            sel.innerHTML = '<option value="">Failed to load teams</option>';
        });
}

function loadProjects() {
    var teamKey = document.getElementById("team").value;
    var sel = document.getElementById("tracker_project");
    sel.innerHTML = '<option value="">— None —</option>';
    if (!teamKey) return;

    fetch("/api/bugtracker/projects?team=" + encodeURIComponent(teamKey))
        .then(function(r) {
            if (!r.ok) throw new Error("Failed to load projects");
            return r.json();
        })
        .then(function(projects) {
            projects.forEach(function(p) {
                var opt = document.createElement("option");
                opt.value = p.name;
                opt.textContent = p.name;
                sel.appendChild(opt);
            });
        })
        .catch(function() {});
}

function submitAddProject(evt) {
    evt.preventDefault();
    var errDiv = document.getElementById("form-errors");
    errDiv.style.display = "none";
    errDiv.textContent = "";

    var btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Starting...";

    var body = {
        repo_url: document.getElementById("repo_url").value.trim(),
        name: document.getElementById("project_name").value.trim(),
        slots: parseInt(document.getElementById("slots_count").value, 10) || 1,
        create_github: document.getElementById("create_github").checked,
        project_type: document.getElementById("project_type").value,
        setup_commands: document.getElementById("setup_commands").value.trim()
    };

    if (_bugtrackerType === "jira") {
        body.team = document.getElementById("jira_project_key").value.trim();
        body.create_linear_project = false;
        var tags = document.getElementById("jira_include_tags").value.trim();
        if (tags) {
            body.include_tags = tags.split(",").map(function(t) { return t.trim(); }).filter(Boolean);
        }
    } else {
        body.team = document.getElementById("team").value;
        var createLinear = document.getElementById("create_linear_project").checked;
        body.create_linear_project = createLinear;
        if (createLinear) {
            body.tracker_project = document.getElementById("new_linear_project_name").value.trim() ||
                                   document.getElementById("project_name").value.trim();
        } else {
            body.tracker_project = document.getElementById("tracker_project").value;
        }
    }

    fetch("/api/project/create", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    }).then(function(resp) {
        return resp.json().then(function(data) {
            return {ok: resp.ok, data: data};
        });
    }).then(function(result) {
        if (!result.ok) {
            var errors = result.data.errors || [result.data.error || "Request failed"];
            errDiv.textContent = "";
            errors.forEach(function(e, i) {
                if (i > 0) errDiv.appendChild(document.createElement("br"));
                errDiv.appendChild(document.createTextNode("\u2022 " + e));
            });
            errDiv.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Add Project";
            return;
        }
        streamProgress(result.data.task_id);
    }).catch(function(err) {
        errDiv.textContent = "Request failed: " + err.message;
        errDiv.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Add Project";
    });

    return false;
}

function streamProgress(taskId) {
    document.getElementById("add-project-form-container").style.display = "none";
    var progressDiv = document.getElementById("add-project-progress");
    progressDiv.style.display = "block";
    var logDiv = document.getElementById("progress-log");
    var resultDiv = document.getElementById("progress-result");

    var source = new EventSource("/api/project/create/progress?task_id=" + encodeURIComponent(taskId));

    source.addEventListener("progress", function(e) {
        logDiv.textContent += e.data + "\n";
        logDiv.scrollTop = logDiv.scrollHeight;
    });

    source.addEventListener("done", function(e) {
        source.close();
        logDiv.textContent += "\nDone!\n";
        resultDiv.innerHTML = '<p style="color: var(--pico-ins-color); font-weight: 600;">Project added successfully!</p>' +
            '<a href="/" role="button">Back to Live Status</a>';
    });

    source.addEventListener("error", function(e) {
        if (e.data) {
            source.close();
            logDiv.textContent += "\nError: " + e.data + "\n";
            resultDiv.innerHTML = '<p style="color: var(--pico-del-color); font-weight: 600;">Setup failed</p>' +
                '<button onclick="showFormAgain()">Try Again</button>';
        }
    });

    source.onerror = function() {
        source.close();
        logDiv.textContent += "\nConnection lost.\n";
        resultDiv.innerHTML = '<p style="color: var(--pico-del-color); font-weight: 600;">Connection lost</p>' +
            '<button onclick="showFormAgain()">Try Again</button>';
    };
}

function showFormAgain() {
    document.getElementById("add-project-form-container").style.display = "block";
    document.getElementById("add-project-progress").style.display = "none";
    document.getElementById("progress-log").textContent = "";
    document.getElementById("progress-result").innerHTML = "";
    var btn = document.getElementById("submit-btn");
    btn.disabled = false;
    btn.textContent = "Add Project";
}

document.addEventListener("DOMContentLoaded", function() {
    if (_bugtrackerType === "linear") {
        loadTeams();
    }
    toggleGithubOption();
});
</script>
{% endblock %}
