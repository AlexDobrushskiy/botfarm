<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>{% block title %}Botfarm Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { --pico-font-size: 15px; }
        nav ul { margin-bottom: 0; }
        nav.container-fluid a[aria-current="page"] {
            font-weight: 600;
            color: var(--pico-primary);
            border-bottom: 2px solid var(--pico-primary);
        }
        .status-free { color: var(--pico-ins-color); }
        .status-busy { color: var(--pico-color-yellow-500, #eab308); }
        .status-paused_limit { color: var(--pico-color-purple-400, #c084fc); }
        .status-failed { color: var(--pico-del-color); }
        .status-completed_pending_cleanup { color: var(--pico-color-cyan-400, #22d3ee); }
        .status-paused_manual { color: var(--pico-color-orange-400, #fb923c); }
        .pause-btn {
            padding: 0.4rem 1rem;
            border-radius: var(--pico-border-radius);
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .pause-btn-pause {
            background: var(--pico-color-yellow-500, #eab308);
            color: #000;
        }
        .pause-btn-pausing {
            background: var(--pico-color-orange-400, #fb923c);
            color: #000;
            cursor: default;
            opacity: 0.8;
        }
        .pause-btn-resume {
            background: var(--pico-ins-color);
            color: #fff;
        }
        .pause-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
        }
        .pause-controls-buttons {
            display: flex;
            gap: 0.4rem;
        }
        .pause-hint {
            font-size: 0.72rem;
            color: var(--pico-muted-color);
            max-width: 22rem;
            text-align: right;
            line-height: 1.3;
        }
        .pause-worker-list {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
        }
        .pause-worker-item {
            font-size: 0.7rem;
            color: var(--pico-color-yellow-500, #eab308);
            font-family: var(--pico-font-family-monospace, monospace);
        }
        .banner-paused {
            background: var(--pico-del-color);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: var(--pico-border-radius);
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .supervisor-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            font-weight: normal;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            vertical-align: middle;
            margin-left: 0.5rem;
        }
        .supervisor-badge-running {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .supervisor-badge-stopped {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .supervisor-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            display: inline-block;
        }
        .supervisor-dot-running { background: #22c55e; }
        .supervisor-dot-stopped { background: #ef4444; }
        table { font-size: 0.9rem; }
        .metric-card {
            text-align: center;
            padding: 1.5rem;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .metric-card h2 {
            margin-bottom: 0.25rem;
            font-size: clamp(1.1rem, 2.5vw, 1.75rem);
        }
        .metric-card p { margin-bottom: 0; color: var(--pico-muted-color); }
        @media (max-width: 768px) {
            .grid:has(.metric-card) {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }
            .metric-card { padding: 1rem; }
        }
        @media (max-width: 480px) {
            .grid:has(.metric-card) {
                grid-template-columns: repeat(2, 1fr);
            }
            .metric-card { padding: 0.75rem; }
        }
        progress { width: 100%; height: 0.5rem; margin-top: 0.25rem; }

        /* Pipeline stepper */
        .pipeline-stepper {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            margin: 1.5rem 0;
            padding: 1rem 0;
        }
        .pipeline-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            min-width: 0;
        }
        .pipeline-node {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            border: 3px solid var(--pico-muted-color);
            background: transparent;
            color: var(--pico-muted-color);
            position: relative;
            z-index: 1;
        }
        .pipeline-node-completed {
            background: var(--pico-ins-color);
            border-color: var(--pico-ins-color);
            color: #fff;
        }
        .pipeline-node-failed {
            background: var(--pico-del-color);
            border-color: var(--pico-del-color);
            color: #fff;
        }
        .pipeline-node-active {
            border-color: var(--pico-color-yellow-500, #eab308);
            color: var(--pico-color-yellow-500, #eab308);
            animation: pulse-border 1.5s ease-in-out infinite;
        }
        .pipeline-node-pending {
            border-color: var(--pico-muted-color);
            color: var(--pico-muted-color);
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
        }
        .pipeline-connector {
            position: absolute;
            top: 1.25rem;
            right: 50%;
            width: 100%;
            height: 3px;
            z-index: 0;
        }
        .pipeline-connector-completed { background: var(--pico-ins-color); }
        .pipeline-connector-failed { background: var(--pico-del-color); }
        .pipeline-connector-active { background: var(--pico-color-yellow-500, #eab308); }
        .pipeline-connector-pending { background: var(--pico-muted-color); }
        .pipeline-label {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--pico-muted-color);
            text-align: center;
            white-space: nowrap;
        }
        .pipeline-badge {
            margin-top: 0.25rem;
            font-size: 0.7rem;
            background: var(--pico-muted-color);
            color: #fff;
            padding: 0.1rem 0.4rem;
            border-radius: 0.75rem;
        }
        .pipeline-badge-limit {
            background: var(--pico-color-purple-400, #c084fc);
        }
        @media (max-width: 480px) {
            .pipeline-node { width: 1.8rem; height: 1.8rem; font-size: 0.75rem; }
            .pipeline-connector { top: 0.9rem; }
            .pipeline-label { font-size: 0.65rem; }
        }

        /* Compact slot pipeline */
        .slot-pipeline {
            display: flex;
            align-items: center;
        }
        .slot-pipe-dot {
            width: 1.1rem;
            height: 1.1rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .slot-pipe-dot-completed {
            background: var(--pico-ins-color);
            color: #fff;
        }
        .slot-pipe-dot-active {
            border: 2px solid var(--pico-color-yellow-500, #eab308);
            color: var(--pico-color-yellow-500, #eab308);
            animation: pulse-border 1.5s ease-in-out infinite;
        }
        .slot-pipe-dot-pending {
            border: 2px solid var(--pico-muted-color);
            color: var(--pico-muted-color);
        }
        .slot-pipe-dot-failed {
            background: var(--pico-del-color);
            color: #fff;
        }
        .slot-pipe-line {
            width: 0.5rem;
            height: 2px;
            flex-shrink: 0;
        }
        .slot-pipe-line-completed { background: var(--pico-ins-color); }
        .slot-pipe-line-pending { background: var(--pico-muted-color); }
        .slot-pipeline-info {
            font-size: 0.75rem;
            color: var(--pico-muted-color);
            margin-top: 0.15rem;
            white-space: nowrap;
        }
        .slot-iter-badge {
            display: inline-block;
            font-size: 0.65rem;
            background: var(--pico-color-yellow-500, #eab308);
            color: #000;
            padding: 0 0.3rem;
            border-radius: 0.5rem;
            margin-left: 0.25rem;
        }
        .slot-limit-label {
            color: var(--pico-color-purple-400, #c084fc);
            font-size: 0.75rem;
        }
        .stage-elapsed { color: var(--pico-muted-color); }
        .slot-links { white-space: nowrap; font-size: 0.8rem; }
        .slot-links a { margin-right: 0.5rem; }

        /* Failure reason truncation */
        .failure-reason { max-width: 600px; }
        .failure-reason details summary {
            cursor: pointer;
            list-style: none;
        }
        .failure-reason details summary::-webkit-details-marker { display: none; }
        .failure-reason-full {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: var(--pico-card-background-color);
            border-radius: var(--pico-border-radius);
        }

        /* Context fill color coding */
        .ctx-fill-green  { color: #22c55e; }
        .ctx-fill-yellow { color: #eab308; }
        .ctx-fill-orange { color: #fb923c; }
        .ctx-fill-red    { color: #ef4444; }

        /* Clickable row hover effect */
        table tbody tr[onclick] {
            transition: background-color 0.15s ease;
        }
        table tbody tr[onclick]:hover {
            background-color: var(--pico-form-element-background-color);
        }

        /* Live output link (task detail page) */
        .live-output-link {
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            text-decoration: none;
        }

        /* Shared log-live-badge for use across pages */
        .log-live-badge {
            background: #ef4444;
            color: #fff;
            padding: 0.15rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            animation: pulse-live 2s ease-in-out infinite;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Embeddable log stream panel (partials/log_stream.html) */
        .log-stream-panel {
            margin-top: 0.5rem;
        }
        .log-stream-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0;
        }
        .log-stream-stage {
            font-weight: 600;
            text-transform: capitalize;
            font-size: 0.85rem;
        }
        .log-stream-live {
            background: #ef4444;
            color: #fff;
            padding: 0.1rem 0.4rem;
            border-radius: 0.2rem;
            font-size: 0.65rem;
            font-weight: 700;
            animation: pulse-live 2s ease-in-out infinite;
        }
        .log-stream-done {
            background: var(--pico-ins-color);
            color: #fff;
            padding: 0.1rem 0.4rem;
            border-radius: 0.2rem;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .log-stream-terminal {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: var(--pico-border-radius);
            padding: 0.5rem;
            overflow: auto;
            min-height: 100px;
        }
        .log-stream-terminal pre {
            margin: 0;
            padding: 0;
            background: transparent;
            color: #c9d1d9;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            border: none;
        }
        /* Log line color-coding by event type */
        .log-line-assistant  { color: #79c0ff; }
        .log-line-tool_use   { color: #d2a8ff; }
        .log-line-tool_result { color: #8b949e; }
        .log-line-result     { color: #3fb950; font-weight: 600; }
        .log-line-system     { color: #8b949e; font-style: italic; }
        .log-line-log        { color: #c9d1d9; }
    </style>
    <script>
    function updateCountdowns() {
        var now = Date.now();
        document.querySelectorAll(".resume-countdown").forEach(function(el) {
            var target = new Date(el.dataset.resume).getTime();
            var diff = target - now;
            if (diff <= 0) { el.textContent = "ready to resume"; return; }
            var mins = Math.ceil(diff / 60000);
            el.textContent = "resumes in " + mins + "m";
        });
        document.querySelectorAll(".reset-countdown").forEach(function(el) {
            var target = new Date(el.dataset.reset).getTime();
            var diff = target - now;
            if (diff <= 0) { el.textContent = "resetting now"; return; }
            var hrs = Math.floor(diff / 3600000);
            var mins = Math.ceil((diff % 3600000) / 60000);
            el.textContent = (hrs > 0 ? hrs + "h " : "") + mins + "m";
        });
    }
    setInterval(updateCountdowns, 10000);
    document.addEventListener("htmx:afterSwap", updateCountdowns);
    document.addEventListener("DOMContentLoaded", updateCountdowns);

    function timeago(isoString) {
        var date = new Date(isoString);
        if (isNaN(date.getTime())) return isoString;
        var now = Date.now();
        var diff = now - date.getTime();
        if (diff < 0) return isoString;
        var seconds = Math.floor(diff / 1000);
        if (seconds < 60) return "just now";
        var minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + "m ago";
        var hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + "h ago";
        var days = Math.floor(hours / 24);
        if (days < 7) return days + "d ago";
        var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return months[date.getMonth()] + " " + date.getDate();
    }
    function updateTimeagos() {
        document.querySelectorAll("[data-timestamp]").forEach(function(el) {
            var ts = el.getAttribute("data-timestamp");
            if (ts) el.textContent = timeago(ts);
        });
    }
    setInterval(updateTimeagos, 60000);
    document.addEventListener("htmx:afterSwap", updateTimeagos);
    document.addEventListener("DOMContentLoaded", updateTimeagos);
    </script>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li>
                <strong>Botfarm</strong>
                <span id="supervisor-badge" hx-get="/partials/supervisor-badge" hx-trigger="every 5s" hx-swap="innerHTML">
                {% include "partials/supervisor_badge.html" %}
                </span>
            </li>
        </ul>
        <ul>
            <li><a href="/"{% if active_page == "status" %} aria-current="page"{% endif %}>Live Status</a></li>
            <li><a href="/history"{% if active_page == "history" %} aria-current="page"{% endif %}>Task History</a></li>
            <li><a href="/usage"{% if active_page == "usage" %} aria-current="page"{% endif %}>Usage Trends</a></li>
            <li><a href="/metrics"{% if active_page == "metrics" %} aria-current="page"{% endif %}>Metrics</a></li>
            <li><a href="/config"{% if active_page == "config" %} aria-current="page"{% endif %}>Configuration</a></li>
            <li><a href="/identities"{% if active_page == "identities" %} aria-current="page"{% endif %}>Identities</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
