name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Install package
        run: |
          . .venv/bin/activate
          pip install -e .

      - name: Run unit tests
        run: |
          . .venv/bin/activate
          python -m pytest tests/ -v -m "not playwright"

      - name: Cleanup
        if: always()
        run: rm -rf .venv

  playwright-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Install package
        run: |
          . .venv/bin/activate
          pip install -e .

      - name: Install Playwright browsers
        run: |
          . .venv/bin/activate
          playwright install chromium --with-deps

      - name: Run Playwright tests
        run: |
          . .venv/bin/activate
          python -m pytest tests/e2e/ -v \
            -m playwright \
            --screenshot=only-on-failure \
            --tracing=retain-on-failure

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: rm -rf .venv
